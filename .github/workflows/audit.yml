name: Release gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle-sync:
    name: Engine bundle sync guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild bundles and verify no drift
        run: |
          python tools/build_zhl_bundle.py
          python tools/build_vpm_bundle.py
          python tools/check_engine_parity.py
          git diff --exit-code zhl-engine-bundle.js vpm-engine-bundle.js

  static-audit:
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps and sync Capacitor android assets
        run: |
          npm ci
          python tools/sync_www.py
          npx cap sync android

      - name: Build Pages site (_pages/)
        run: python tools/build_pages_site.py

      - name: Run audit v2 tests
        run: python -m unittest tools.test_audit_coverage tools.audit.test_system

      - name: Run registry-driven static audit
        run: python -m tools.audit check --profile static

      - name: Upload static audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-v2-release-static
          path: |
            dev/audit-results.json
            dev/audit-report.md

  browser-regression:
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install parser dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          pip install playwright
          playwright install --with-deps chromium

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-36 build-tools;36.0.0

      - name: Run release audit orchestrator
        env:
          LSP_REQUIRE_ANDROID: "1"
        run: python -m tools.audit run --profile release

      - name: Upload release audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-v2-release
          path: |
            dev/audit-results.json
            dev/audit-report.md
