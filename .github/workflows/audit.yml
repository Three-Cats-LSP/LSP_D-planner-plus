name: Release gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run audit.py
        run: python audit.py index.html

  browser-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          pip install playwright
          playwright install --with-deps chromium

      - name: Run full engine regression (all algos)
        run: python dev/engine_regression.py

      - name: Run CCR engine validation regression
        run: python dev/ccr_engine_validation_regression.py

      - name: Run browser regression suites
        run: python dev/run_browser_regression.py

      - name: Run pSCR E2E release gate
        env:
          SKIP_AUDIT: "1"
        run: python dev/validate_pscr_e2e.py

      - name: Run CCR differential comparison suite
        run: python dev/run_ccr_differential.py
