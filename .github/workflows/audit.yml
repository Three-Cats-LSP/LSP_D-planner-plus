name: Release gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle-sync:
    name: Engine bundle sync guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild bundles and verify no drift
        run: |
          python tools/build_zhl_bundle.py
          python tools/build_vpm_bundle.py
          python tools/check_engine_parity.py
          git diff --exit-code zhl-engine-bundle.js vpm-engine-bundle.js

  static-audit:
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps and sync Capacitor android assets
        run: |
          npm ci
          python tools/sync_www.py
          npx cap sync android

      - name: Build Pages site (_pages/)
        run: python tools/build_pages_site.py

      - name: Run audit.py
        run: python audit.py index.html

  browser-regression:
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          pip install playwright
          playwright install --with-deps chromium

      - name: Run release regression orchestrator
        run: python dev/run_all_regression.py --tier release
