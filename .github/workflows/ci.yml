name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-sync:
    name: Engine bundle sync guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild bundles and verify no drift
        run: |
          python tools/build_zhl_bundle.py
          python tools/build_vpm_bundle.py
          python tools/check_engine_parity.py
          git diff --exit-code zhl-engine-bundle.js vpm-engine-bundle.js

  audit-coverage:
    name: Audit v2 unit tests
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install parser dependencies
        run: npm ci

      - name: Test audit platform
        run: python -m unittest tools.test_audit_coverage tools.audit.test_system

  audit:
    name: Static audit
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install parser dependencies
        run: npm ci

      - name: Build Pages site (_pages/)
        run: python tools/build_pages_site.py

      - name: Run registry-driven static audit
        run: python -m tools.audit check --profile static

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-v2-static
          path: |
            dev/audit-results.json
            dev/audit-report.md

  export-regression:
    name: Export regression (PrT / units)
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run export regression suite
        run: python export_regression.py

  engine-full:
    name: Full engine regression (all algos)
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run full engine regression suite
        run: python dev/engine_regression.py

  engine-validation:
    name: Engine validation (malformed inputs)
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run engine validation regression
        run: python engine_validation_regression.py

  native-bridge-regression:
    name: Native bridge regression (Android select + Capacitor)
    needs: [bundle-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/microsoft-*.list
          sudo apt-get update -q
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run native bridge regression
        run: python dev/run_native_regression.py
